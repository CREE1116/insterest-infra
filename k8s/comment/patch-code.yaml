kind: ConfigMap
metadata:
  name: comment-patch-code
data:
  main.py: |
    from fastapi import FastAPI, Request
    from fastapi.middleware.cors import CORSMiddleware
    from sqlalchemy import text
    from app.api.v1.endpoints.endpoint import router
    from app.core.config import settings
    from app.db.session import engine, Base
    import time

    app = FastAPI(title=settings.PROJECT_NAME)
    app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_credentials=True, allow_methods=["*"], allow_headers=["*"])

    @app.middleware("http")
    async def log_requests(request: Request, call_next):
        start_time = time.time()
        response = await call_next(request)
        process_time = (time.time() - start_time) * 1000
        print(f"Request: {request.method} {request.url.path} - Status: {response.status_code} - Time: {process_time:.2f}ms")
        return response

    @app.on_event("startup")
    async def startup():
        async with engine.begin() as conn:
            await conn.execute(text(f"CREATE SCHEMA IF NOT EXISTS {settings.POSTGRES_SCHEMA}"))
            await conn.run_sync(Base.metadata.create_all)

    # 표준 프리픽스 방식 사용
    app.include_router(router, prefix="/api/v1/comments")
  endpoint.py: |
    from fastapi import APIRouter, Depends, HTTPException, Request
    from sqlalchemy.ext.asyncio import AsyncSession
    from sqlalchemy import select, desc
    from app.db.session import get_db
    from app.models.models import Comment
    from app.core.config import settings
    import uuid, httpx
    from typing import List, Dict
    router = APIRouter()

    async def get_uinfo(uids: List[str]) -> Dict:
        if not uids: return {}
        async with httpx.AsyncClient() as c:
            try:
                ps = [("user_ids", uid) for uid in set(uids)]
                r = await c.get(f"{settings.AUTH_SERVICE_URL}/api/v1/users/batch", params=ps, timeout=5.0)
                if r.status_code == 200:
                    return {str(u["id"]): {"name": u.get("full_name") or "User", "img": u.get("profile_image_url") or ""} for u in r.json()}
            except: pass
        return {}

    @router.get("/health")
    async def health(): return {"status": "ok"}

    @router.get("/{post_id}")
    async def list_comments(post_id: uuid.UUID, db: AsyncSession = Depends(get_db)):
        res = await db.execute(select(Comment).where(Comment.post_id == post_id).order_by(desc(Comment.created_at)))
        cs = res.scalars().all()
        uinfo = await get_uinfo([str(c.user_id) for c in cs])
        return [{"id": str(c.id), "content": c.content, "user_id": str(c.user_id), "user_name": uinfo.get(str(c.user_id), {}).get("name", "User"), "user_img": uinfo.get(str(c.user_id), {}).get("img", ""), "created_at": c.created_at} for c in cs]

    @router.post("/{post_id}")
    async def create_comment(post_id: uuid.UUID, data: dict, request: Request, db: AsyncSession = Depends(get_db)):
        uid = request.headers.get("X-User-Id")
        if not uid: raise HTTPException(status_code=401)
        nc = Comment(post_id=post_id, user_id=uuid.UUID(uid), content=data.get("content"))
        db.add(nc); await db.commit(); await db.refresh(nc); return nc
  config.py: |
    from pydantic_settings import BaseSettings, SettingsConfigDict
    class Settings(BaseSettings):
        PROJECT_NAME: str = "Comment Service"
        POSTGRES_SERVER: str = "comment-postgres-service"
        POSTGRES_USER: str = "postgres"
        POSTGRES_PASSWORD: str = "postgres"
        POSTGRES_DB: str = "comment_db"
        POSTGRES_SCHEMA: str = "comment"
        AUTH_SERVICE_URL: str = "http://auth-service:8000"
        @property
        def async_database_url(self) -> str:
            return f"postgresql+asyncpg://{self.POSTGRES_USER}:{self.POSTGRES_PASSWORD}@{self.POSTGRES_SERVER}/{self.POSTGRES_DB}"
        model_config = SettingsConfigDict(case_sensitive=True, env_file=".env")
    settings = Settings()
  session.py: |
    from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
    from sqlalchemy.orm import sessionmaker, declarative_base
    from sqlalchemy import MetaData
    from app.core.config import settings
    engine = create_async_engine(settings.async_database_url, echo=True)
    AsyncSessionLocal = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
    metadata = MetaData(schema="comment")
    Base = declarative_base(metadata=metadata)
    async def get_db():
        async with AsyncSessionLocal() as session: yield session
  models.py: |
    import uuid
    from sqlalchemy import Column, String, DateTime, Text, func
    from sqlalchemy.dialects.postgresql import UUID
    from app.db.session import Base
    class Comment(Base):
        __tablename__ = "comments"
        id = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
        post_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        user_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        content = Column(Text, nullable=False)
        created_at = Column(DateTime(timezone=True), server_default=func.now())
