apiVersion: v1
kind: Service
metadata:
  name: console-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: console-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-frontend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: console-frontend
  template:
    metadata:
      labels:
        app: console-frontend
    spec:
      containers:
      - name: console-frontend
        image: cree1116/console-frontend:7a43cc99a92c702ddd544724415d07e894f3bc31
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
