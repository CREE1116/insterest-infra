apiVersion: v1
kind: Service
metadata:
  name: interaction-service
spec:
  ports:
    - port: 8004
      targetPort: 8004
  selector:
    app: interaction-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interaction-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: interaction-service
  template:
    metadata:
      labels:
        app: interaction-service
    spec:
      containers:
      - name: interaction-service
        image: cree1116/interaction-service:8748ae5bb6ea11542dd13e1278d27626859739b1
        imagePullPolicy: Always
        ports:
        - containerPort: 8004
        env:
        - name: POSTGRES_SERVER
          value: "postgres-service"
        - name: POSTGRES_DB
          value: "auth_db"
        - name: POSTGRES_SCHEMA
          value: "interaction"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: PYTHONPATH
          value: "/app"
        - name: SECRET_KEY
          value: "k8s-local-secret-key"
