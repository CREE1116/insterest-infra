  main.py: |
    from fastapi import FastAPI
    from fastapi.middleware.cors import CORSMiddleware
    from sqlalchemy import text
    from app.api.v1.endpoints.endpoint import router
    from app.core.config import settings
    from app.db.session import engine, Base
    import asyncio, json
    from aiokafka import AIOKafkaProducer
    app = FastAPI(title=settings.PROJECT_NAME)
    app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_credentials=True, allow_methods=["*"], allow_headers=["*"])
    app.state.producer = None
    async def start_kafka():
        try:
            producer = AIOKafkaProducer(bootstrap_servers=settings.KAFKA_BOOTSTRAP_SERVERS, value_serializer=lambda v: json.dumps(v).encode('utf-8'))
            await producer.start(); app.state.producer = producer
        except: pass
    @app.on_event("startup")
    async def startup():
        async with engine.begin() as conn:
            await conn.execute(text(f"CREATE SCHEMA IF NOT EXISTS {settings.POSTGRES_SCHEMA}"))
            await conn.run_sync(Base.metadata.create_all)
        asyncio.create_task(start_kafka())
    # 프리픽스를 /api/v1/interactions 로 단일화
    app.include_router(router, prefix="/api/v1/interactions")
  endpoint.py: |
    from fastapi import APIRouter, Depends, HTTPException, Request
    from sqlalchemy.ext.asyncio import AsyncSession
    from sqlalchemy import select, func
    from app.db.session import get_db
    from app.models.interaction import Like, Save, WatchTime, View
    import uuid
    from typing import List, Dict
    router = APIRouter()
    async def get_uid(r: Request):
        u = r.headers.get("X-User-Id"); return uuid.UUID(u) if u else None
    @router.post("/{post_id}/like")
    async def toggle_like(post_id: uuid.UUID, db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: raise HTTPException(status_code=401)
        ex = await db.scalar(select(Like).where(Like.post_id == post_id, Like.user_id == uid))
        liked = True
        if ex: await db.delete(ex); await db.commit(); liked = False
        else: db.add(Like(post_id=post_id, user_id=uid)); await db.commit()
        count = await db.scalar(select(func.count(Like.id)).where(Like.post_id == post_id)) or 0
        return {"liked": liked, "likes_count": count}
    @router.post("/{post_id}/save")
    async def toggle_save(post_id: uuid.UUID, db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: raise HTTPException(status_code=401)
        ex = await db.scalar(select(Save).where(Save.post_id == post_id, Save.user_id == uid))
        saved = True
        if ex: await db.delete(ex); await db.commit(); saved = False
        else: db.add(Save(post_id=post_id, user_id=uid)); await db.commit()
        return {"saved": saved}
    @router.get("/{post_id}/status")
    async def get_status(post_id: uuid.UUID, db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: return {"is_liked": False, "is_saved": False}
        l = await db.scalar(select(func.count(Like.id)).where(Like.post_id == post_id, Like.user_id == uid))
        s = await db.scalar(select(func.count(Save.id)).where(Save.post_id == post_id, Save.user_id == uid))
        return {"is_liked": l > 0, "is_saved": s > 0}
    @router.post("/stats/batch")
    async def stats_batch(post_ids: List[str], db: AsyncSession = Depends(get_db)):
        if not post_ids: return {}
        p_uuids = [uuid.UUID(pid) for pid in post_ids]
        l_res = await db.execute(select(Like.post_id, func.count(Like.id)).where(Like.post_id.in_(p_uuids)).group_by(Like.post_id))
        likes_map = {str(pid): count for pid, count in l_res.all()}
        s_res = await db.execute(select(Save.post_id, func.count(Save.id)).where(Save.post_id.in_(p_uuids)).group_by(Save.post_id))
        saves_map = {str(pid): count for pid, count in s_res.all()}
        return {pid: {"likes": likes_map.get(pid, 0), "saves": saves_map.get(pid, 0)} for pid in post_ids}
    @router.get("/me/likes")
    async def my_likes(db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: return []
        res = await db.execute(select(Like.post_id).where(Like.user_id == uid))
        return [str(r) for r in res.scalars().all()]
    @router.get("/me/saves")
    async def my_saves(db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: return []
        res = await db.execute(select(Save.post_id).where(Save.user_id == uid))
        return [str(r) for r in res.scalars().all()]
    @router.get("/stats/{post_id}")
    async def get_stats(post_id: uuid.UUID, db: AsyncSession = Depends(get_db)):
        l = await db.scalar(select(func.count(Like.id)).where(Like.post_id == post_id)) or 0
        s = await db.scalar(select(func.count(Save.id)).where(Save.post_id == post_id)) or 0
        return {"likes": l, "saves": s}
    @router.post("/{post_id}/view")
    async def record_view(post_id: uuid.UUID, db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        db.add(View(post_id=post_id, user_id=uid or uuid.uuid4())); await db.commit(); return {"ok": True}
    @router.post("/watch-time")
    async def record_wt(data: dict, db: AsyncSession = Depends(get_db), uid: uuid.UUID = Depends(get_uid)):
        if not uid: return {"ok": False}
        db.add(WatchTime(post_id=uuid.UUID(data["post_id"]), user_id=uid, duration_seconds=data["duration"])); await db.commit(); return {"ok": True}
  config.py: |
    from pydantic_settings import BaseSettings, SettingsConfigDict
    class Settings(BaseSettings):
        PROJECT_NAME: str = "Interaction Service"
        API_V1_STR: str = "/api/v1"
        POSTGRES_SERVER: str = "interaction-postgres-service"
        POSTGRES_USER: str = "postgres"
        POSTGRES_PASSWORD: str = "postgres"
        POSTGRES_DB: str = "interaction_db"
        POSTGRES_SCHEMA: str = "interaction"
        KAFKA_BOOTSTRAP_SERVERS: str = "kafka:9092"
        @property
        def async_database_url(self) -> str:
            return f"postgresql+asyncpg://{self.POSTGRES_USER}:{self.POSTGRES_PASSWORD}@{self.POSTGRES_SERVER}/{self.POSTGRES_DB}"
        model_config = SettingsConfigDict(case_sensitive=True, env_file=".env")
    settings = Settings()
  session.py: |
    from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
    from sqlalchemy.orm import sessionmaker, declarative_base
    from sqlalchemy import MetaData
    from app.core.config import settings
    engine = create_async_engine(settings.async_database_url, echo=True)
    AsyncSessionLocal = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
    metadata = MetaData(schema="interaction")
    Base = declarative_base(metadata=metadata)
    async def get_db():
        async with AsyncSessionLocal() as session: yield session
  models.py: |
    import uuid
    from sqlalchemy import Column, DateTime, Float, func, UniqueConstraint
    from sqlalchemy.dialects.postgresql import UUID
    from app.db.session import Base
    class Like(Base):
        __tablename__ = "likes"
        __table_args__ = (UniqueConstraint('user_id', 'post_id', name='_up_like_uc'),)
        id = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
        user_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        post_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        created_at = Column(DateTime(timezone=True), server_default=func.now())
    class Save(Base):
        __tablename__ = "saves"
        __table_args__ = (UniqueConstraint('user_id', 'post_id', name='_up_save_uc'),)
        id = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
        user_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        post_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        created_at = Column(DateTime(timezone=True), server_default=func.now())
    class View(Base):
        __tablename__ = "views"
        id = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
        user_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        post_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        created_at = Column(DateTime(timezone=True), server_default=func.now())
    class WatchTime(Base):
        __tablename__ = "watch_times"
        id = Column(UUID(as_uuid=True), primary_key=True, default=uuid.uuid4)
        user_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        post_id = Column(UUID(as_uuid=True), index=True, nullable=False)
        duration_seconds = Column(Float, nullable=False)
        created_at = Column(DateTime(timezone=True), server_default=func.now())
