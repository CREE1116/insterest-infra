apiVersion: v1
kind: ConfigMap
metadata:
  name: interaction-patch-code
data:
  # interaction-service: 503 방지를 위해 Kafka를 백그라운드에서 시작
  main.py: |
    from fastapi import FastAPI
    from fastapi.middleware.cors import CORSMiddleware
    from sqlalchemy import text
    from app.api.v1.endpoints.endpoint import router
    from app.core.config import settings
    from app.db.session import engine, Base
    import asyncio, json
    from aiokafka import AIOKafkaProducer

    app = FastAPI(title=settings.PROJECT_NAME)
    app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_credentials=True, allow_methods=["*"], allow_headers=["*"])
    app.state.producer = None

    async def start_kafka():
        try:
            producer = AIOKafkaProducer(bootstrap_servers=settings.KAFKA_BOOTSTRAP_SERVERS, value_serializer=lambda v: json.dumps(v).encode('utf-8'))
            await producer.start()
            app.state.producer = producer
            print("Kafka connected successfully")
        except Exception as e: print(f"Kafka connection deferred: {e}")

    @app.on_event("startup")
    async def startup():
        async with engine.begin() as conn:
            await conn.execute(text(f"CREATE SCHEMA IF NOT EXISTS {settings.POSTGRES_SCHEMA}"))
            await conn.run_sync(Base.metadata.create_all)
        asyncio.create_task(start_kafka()) # Kafka 연결을 기다리지 않고 서버 즉시 가동

    app.include_router(router, prefix="/api/v1/interactions")

