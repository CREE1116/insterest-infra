apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
    spec:
      containers:
      - name: comment-service
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. 디렉토리 구조 생성
            mkdir -p /app/app/api/v1/endpoints /app/app/core /app/app/db /app/app/models
            # 2. 패키지 초기화 파일 생성 (전체 경로)
            touch /app/__init__.py /app/app/__init__.py /app/app/api/__init__.py /app/app/api/v1/__init__.py /app/app/api/v1/endpoints/__init__.py /app/app/core/__init__.py /app/app/db/__init__.py /app/app/models/__init__.py
            # 3. 소스 코드 복사
            cp /patch/main.py /app/app/main.py
            cp /patch/config.py /app/app/core/config.py
            cp /patch/session.py /app/app/db/session.py
            cp /patch/models.py /app/app/models/models.py
            cp /patch/endpoint.py /app/app/api/v1/endpoints/endpoint.py
            # 4. 의존성 설치 및 실행
            pip install fastapi uvicorn sqlalchemy asyncpg pydantic-settings httpx
            export PYTHONPATH=/app
            cd /app && python -m uvicorn app.main:app --host 0.0.0.0 --port 8005
        ports:
        - containerPort: 8005
        env:
        - name: POSTGRES_SERVER
          value: "comment-postgres-service"
        - name: POSTGRES_DB
          value: "comment_db"
        - name: POSTGRES_SCHEMA
          value: "comment"
        volumeMounts:
        - name: patch-vol
          mountPath: /patch
      volumes:
      - name: patch-vol
        configMap:
          name: comment-patch-code
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: interaction-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interaction-service
  template:
    metadata:
      labels:
        app: interaction-service
    spec:
      containers:
      - name: interaction-service
        image: python:3.12-slim
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /app/app/api/v1/endpoints /app/app/core /app/app/db /app/app/models
            touch /app/__init__.py /app/app/__init__.py /app/app/api/__init__.py /app/app/api/v1/__init__.py /app/app/api/v1/endpoints/__init__.py /app/app/core/__init__.py /app/app/db/__init__.py /app/app/models/__init__.py
            cp /patch/main.py /app/app/main.py
            cp /patch/config.py /app/app/core/config.py
            cp /patch/session.py /app/app/db/session.py
            cp /patch/models.py /app/app/models/interaction.py
            cp /patch/endpoint.py /app/app/api/v1/endpoints/endpoint.py
            pip install fastapi uvicorn sqlalchemy asyncpg aiokafka pydantic-settings
            export PYTHONPATH=/app
            cd /app && python -m uvicorn app.main:app --host 0.0.0.0 --port 8004
        ports:
        - containerPort: 8004
        env:
        - name: POSTGRES_SERVER
          value: "interaction-postgres-service"
        - name: POSTGRES_DB
          value: "interaction_db"
        volumeMounts:
        - name: patch-vol
          mountPath: /patch
      volumes:
      - name: patch-vol
        configMap:
          name: interaction-patch-code
