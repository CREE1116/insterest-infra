apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: generation-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: generation-service
spec:
  ports:
    - port: 8002
      targetPort: 8002
  selector:
    app: generation-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: generation-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: generation-service
  template:
    metadata:
      labels:
        app: generation-service
    spec:
      containers:
      - name: generation-service
        image: cree1116/generation-service:8748ae5bb6ea11542dd13e1278d27626859739b1
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: generation-secrets-manual
              key: GEMINI_API_KEY
        - name: HF_HOME
          value: "/app/models"
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: SECRET_KEY
          value: "k8s-local-secret-key"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        ports:
        - containerPort: 8002
        volumeMounts:
        - name: outputs
          mountPath: /app/outputs
      volumes:
      - name: outputs
        persistentVolumeClaim:
          claimName: generation-pvc


