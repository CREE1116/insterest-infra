apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recommendation-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
spec:
  selector:
    app: recommendation-service
  ports:
  - protocol: TCP
    port: 8008
    targetPort: 8008
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
      - name: recommendation-service
        image: cree1116/recommendation-service:dbc3782decd05c5c6f91dad7230b0daf9b6891dc
        imagePullPolicy: Always
        ports:
        - containerPort: 8008
        env:
        - name: POSTGRES_SERVER
          value: "postgres-service"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "auth_db"
        - name: REDIS_HOST
          value: "redis"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: UPLOAD_SERVICE_URL
          value: "http://upload-service:8001"
        - name: USER_SERVICE_URL
          value: "http://user-service:8006"
        - name: INTERACTION_SERVICE_URL
          value: "http://interaction-service:8004"
        - name: COMMENT_SERVICE_URL
          value: "http://comment-service:8005"
        - name: MODEL_SAVE_PATH
          value: "/app/models/discovery_engine.pth"
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 15
        resources:
          limits:
            memory: "2Gi"
            cpu: "2.0"
          requests:
            memory: "1Gi"
            cpu: "1.0"
        volumeMounts:
        - name: model-storage
          mountPath: /data/models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: recommendation-pvc
