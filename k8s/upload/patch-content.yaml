apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-content-fix
data:
  content.py: |
    from fastapi import APIRouter, Depends, HTTPException
    from sqlalchemy.ext.asyncio import AsyncSession
    from sqlalchemy import select, desc
    from sqlalchemy.orm import selectinload
    from app.api.deps import get_db, get_current_user_id
    from app.models.media import Content, Post, Media, MediaType, ContentType, Hashtag, GenerationMeta
    import uuid
    from datetime import datetime
    from typing import List, Optional, Any, Dict
    from pydantic import BaseModel, ConfigDict

    router = APIRouter()

    class MediaRead(BaseModel):
        id: uuid.UUID
        type: str
        url: str
        model_config = ConfigDict(from_attributes=True)

    class HashtagRead(BaseModel):
        tag: str
        model_config = ConfigDict(from_attributes=True)

    class ContentRead(BaseModel):
        id: uuid.UUID
        user_id: uuid.UUID
        content_type: str
        created_at: datetime
        media_list: List[MediaRead] = []
        metadata_info: Optional[Dict[str, Any]] = None
        image_prompt: Optional[str] = None
        audio_prompt: Optional[str] = None
        model_config = ConfigDict(from_attributes=True)

    class PostRead(BaseModel):
        id: uuid.UUID
        user_id: uuid.UUID
        content_id: uuid.UUID
        caption: Optional[str] = None
        created_at: datetime
        like_count: int
        view_count: int
        content: ContentRead
        hashtags: List[HashtagRead] = []
        model_config = ConfigDict(from_attributes=True)

    class PostCreate(BaseModel):
        content_id: uuid.UUID
        caption: Optional[str] = None
        hashtags: List[str] = []

    def enrich_content_read(c: Content) -> ContentRead:
        c_read = ContentRead.model_validate(c)
        if c.metadata_info:
            c_read.image_prompt = c.metadata_info.get("image_prompt")
            c_read.audio_prompt = c.metadata_info.get("music_prompt")
        if c.generation_meta:
            c_read.image_prompt = c_read.image_prompt or c.generation_meta.image_prompt
            c_read.audio_prompt = c_read.audio_prompt or c.generation_meta.audio_prompt
        return c_read

    @router.post("/", response_model=dict)
    async def create_post(*, db: AsyncSession = Depends(get_db), current_user_id: uuid.UUID = Depends(get_current_user_id), post_in: PostCreate):
        result = await db.execute(select(Content).where(Content.id == post_in.content_id))
        content = result.scalar_one_or_none()
        if not content: raise HTTPException(status_code=404, detail="Content not found.")
        new_post = Post(user_id=current_user_id, content_id=content.id, caption=post_in.caption or (content.metadata_info.get("title") if content.metadata_info else None))
        db.add(new_post); await db.flush(); await db.refresh(new_post, ["hashtags"])
        for tag_str in post_in.hashtags:
            tag_str = tag_str.strip().replace("#", "")
            if not tag_str: continue
            h_result = await db.execute(select(Hashtag).where(Hashtag.tag == tag_str))
            hashtag = h_result.scalar_one_or_none()
            if not hashtag: hashtag = Hashtag(tag=tag_str); db.add(hashtag); await db.flush()
            if hashtag not in new_post.hashtags: new_post.hashtags.append(hashtag)
        await db.commit()
        return {"post_id": str(new_post.id), "status": "posted"}

    @router.delete("/{post_id}")
    async def delete_post(post_id: uuid.UUID, db: AsyncSession = Depends(get_db), current_user_id: uuid.UUID = Depends(get_current_user_id)):
        result = await db.execute(select(Post).where(Post.id == post_id))
        post = result.scalar_one_or_none()
        if not post: raise HTTPException(status_code=404, detail="Post not found.")
        if post.user_id != current_user_id: raise HTTPException(status_code=403, detail="Not authorized.")
        post.is_deleted = True
        await db.commit()
        return {"status": "deleted"}

    @router.get("/feed", response_model=List[PostRead])
    async def get_feed(*, db: AsyncSession = Depends(get_db), skip: int = 0, limit: int = 10):
        result = await db.execute(select(Post).options(selectinload(Post.hashtags), selectinload(Post.content).selectinload(Content.media_list), selectinload(Post.content).selectinload(Content.generation_meta)).where(Post.is_deleted == False).order_by(desc(Post.created_at)).offset(skip).limit(limit))
        posts = result.scalars().all()
        return [PostRead.model_validate(p) for p in posts]

    @router.get("/archive", response_model=List[ContentRead])
    async def get_my_archive(*, db: AsyncSession = Depends(get_db), current_user_id: uuid.UUID = Depends(get_current_user_id), skip: int = 0, limit: int = 20):
        result = await db.execute(select(Content).options(selectinload(Content.media_list), selectinload(Content.generation_meta)).where(Content.user_id == current_user_id, Content.is_deleted == False).order_by(desc(Content.created_at)).offset(skip).limit(limit))
        contents = result.scalars().all()
        return [enrich_content_read(c) for c in contents]
