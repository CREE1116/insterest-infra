apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
      - name: recommendation-service
        image: cree1116/recommendation-service:7ad3b2c55db7d1b5a4ea5b996a9494488de362fc
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8008
        env:
        - name: POSTGRES_SERVER
          value: "postgres-service"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "auth_db"
        - name: REDIS_HOST
          value: "redis"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: UPLOAD_SERVICE_URL
          value: "http://upload-service:8001"
        - name: USER_SERVICE_URL
          value: "http://user-service:8006"
        - name: INTERACTION_SERVICE_URL
          value: "http://interaction-service:8004"
        - name: COMMENT_SERVICE_URL
          value: "http://comment-service:8005"
        readinessProbe:
          httpGet:
            path: /health
            port: 8008
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 15
        resources:
          limits:
            memory: "6Gi"
            cpu: "2.0"
          requests:
            memory: "4Gi"
            cpu: "1.0"
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
spec:
  selector:
    app: recommendation-service
  ports:
  - protocol: TCP
    port: 8008
    targetPort: 8008
